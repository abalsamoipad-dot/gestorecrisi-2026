      <h1>Gestore della Crisi — Risanamento e Continuità Aziendale</h1>
      <p>Supportiamo imprenditori e management nella gestione strutturata della crisi d'impresa, dalla diagnosi iniziale fino alla definizione di un percorso di risanamento concreto e personalizzato.</p>

      <h2>I nostri servizi</h2>
      <ul>
        <li><strong>Diagnosi e Gestione Crisi</strong> — Analisi tempestiva degli squilibri patrimoniali ed economico-finanziari per intercettare i segnali di allerta.</li>
        <li><strong>Ristrutturazione del Debito</strong> — Negoziazione con istituti di credito, fornitori ed erario per piani di rientro sostenibili.</li>
        <li><strong>Adeguati Assetti CCII</strong> — Progettazione di assetti organizzativi, amministrativi e contabili conformi al Codice della Crisi.</li>
        <li><strong>Continuità Aziendale</strong> — Piani strategici per preservare il valore dell'impresa attraverso strumenti di composizione e protezione.</li>
      </ul>

      <h2>Il Team</h2>
      <p><strong>Antonio Balsamo</strong> — Managing Partner, Dottore Commercialista e Revisore Legale</p>
      <p><strong>Marco Vizzini</strong> — Senior Advisor Legale, specializzato in diritto societario e fallimentare</p>
      <p><strong>Giuseppe Marotta</strong> — Advisor Finanziario, esperto in controllo di gestione</p>

      <h2>Domande Frequenti</h2>
      <h3>Cos'è la composizione negoziata?</h3>
      <p>È un percorso stragiudiziale e riservato per le imprese in squilibrio, introdotto dal Codice della Crisi d'Impresa.</p>
      <h3>Quali sono le misure protettive?</h3>
      <p>Provvedimenti del tribunale che impediscono ai creditori di avviare azioni esecutive sul patrimonio aziendale.</p>
      <h3>Cosa sono gli Adeguati Assetti?</h3>
      <p>Sistemi di controllo interno obbligatori per legge (Art. 2086 c.c.) per il monitoraggio della sostenibilità aziendale.</p>
